#================= 基础端口配置 =================
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
allow-lan: true
mode: rule
unified-delay: true
tcp-concurrent: true
#================= 控制面板 =================
external-controller: "[::]:9090"
secret: "360744"

authentication:
  - nikki:360744

external-ui: ui
external-ui-url: https://v4.gh-proxy.org/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
profile:
  store-selected: true
  store-fake-ip: false
#================= TUN 模式 =================
tun:
  enable: true
  stack: system
  device: TUN1
  auto-route: true   
  auto-redirect: true
  auto-detect-interface: true


#================= DNS 配置 =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.7777188.xyz"
    - GeoSite:cn

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 1.1.1.1
    - 8.8.8.8

  proxy-server-nameserver:
    - 1.1.1.1

#  nameserver-policy:
#    "GeoSite:cn":
#      - https://223.5.5.5/dns-query
#      - https://119.29.29.29/dns-query

#    "GeoSite:geolocation-!cn":
#      - https://dns.cloudflare.com/dns-query
#      - https://dns.google/dns-query
#================= 流量嗅探 =================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true

  sniff:
    HTTP:
      ports:
        - 80
        - 8080
      override-destination: true

    TLS:
      ports:
        - 443
        - 8443
      override-destination: true

    QUIC:
      ports:
        - 443
        - 8443
      override-destination: true
#================= GEO 数据 =================
geodata-mode: true
geodata-loader: standard
geox-url:
  geosite: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  geoip: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
geo-auto-update: true
geo-update-interval: 24
#================= 节点订阅 =================
proxy-providers:
  airport:
    type: http
    url: "http://10.10.10.7:3001/CKg2abstVnOeRpm1aB4G/download/32?target=ClashMeta"
    proxy: DIRECT
    path: ./proxy_provider/airport.yaml
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
proxies:
- name: "direct"
  type: direct
  udp: true      
